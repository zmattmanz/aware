; PlaneWatch C5 — ESP32-C5 WiFi Remote ID sniffer. Flash to the C5, not StickS3.
; core_dir isolates this project's pioarduino toolchain from the global one the
; StickS3 (official platform) build uses, so they don't clobber each other.
[platformio]
core_dir = C:/pio-c5

[env:c5]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c5-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
  ; CDC OFF: Serial/Serial0 both map to UART0 pads. IDF logs silenced in setup()
  ; via esp_log_level_set so nothing rides the link wire but our H|/R|/W| protocol.
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DCORE_DEBUG_LEVEL=0
